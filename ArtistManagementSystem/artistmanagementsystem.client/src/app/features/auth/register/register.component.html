<div class="auth-page">
  <div class="auth-container glass-panel">
    <div class="auth-logo">
      <span class="logo-icon">🎵</span>
      <h1>ArtistHub</h1>
      <p>Admin Panel</p>
    </div>

    <h2>Create account</h2>
    <p class="auth-subtitle">Register as an admin user</p>

    <div *ngIf="error" class="alert-error">{{ error }}</div>
    <div *ngIf="success" class="alert-success">{{ success }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="row-2">
        <div class="form-group">
          <label>First Name<sup>*</sup></label>
          <input type="text" formControlName="firstName" class="input-field" placeholder="first name" />
          <span class="error" *ngIf="form.get('firstName')?.invalid && form.get('firstName')?.touched">Required.</span>
        </div>
        <div class="form-group">
          <label>Last Name<sup>*</sup></label>
          <input type="text" formControlName="lastName" class="input-field" placeholder="last name" />
          <span class="error" *ngIf="form.get('lastName')?.invalid && form.get('lastName')?.touched">Required.</span>
        </div>
      </div>

      <div class="form-group">
        <label>Email<sup>*</sup></label>
        <input id="reg-email" type="email" formControlName="email" class="input-field" placeholder="email address" />
        <span class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">Valid email
          required.</span>
      </div>

      <div class="form-group">
        <label>Password<sup>*</sup></label>
        <input id="reg-password" type="password" formControlName="password" class="input-field"
          placeholder="password" />
        <span class="error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">Min 6
          characters.</span>
      </div>

      <div class="row-2">
        <div class="form-group">
          <label>Date of Birth<sup>*</sup></label>
          <input type="date" formControlName="dob" class="input-field" />
          <span class="error" *ngIf="form.get('dob')?.invalid && form.get('dob')?.touched">Required.</span>
        </div>
        <div class="form-group">
          <label>Gender<sup>*</sup></label>
          <select formControlName="gender" class="input-field">
            <option value="">Select...</option>
            <option value="m">Male</option>
            <option value="f">Female</option>
            <option value="o">Other</option>
          </select>
          <span class="error" *ngIf="form.get('gender')?.invalid && form.get('gender')?.touched">Required.</span>
        </div>
      </div>

      <div class="row-2">
        <div class="form-group">
          <label>Phone (optional)</label>
          <input type="text" formControlName="phone" class="input-field" placeholder="phone number" />
          <span class="error" *ngIf="form.get('phone')?.invalid && form.get('phone')?.touched">
            Phone number must be exactly 10 digits.
          </span>
        </div>
      </div>

      <div class="form-group">
        <label>Address (optional)</label>
        <input type="text" formControlName="address" class="input-field" placeholder="address" />
      </div>

      <button id="reg-submit" type="submit" class="btn btn-primary full-width" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign In</a>
    </p>
  </div>
</div>
