<div class="auth-page">
  <div class="auth-container glass-panel">
    <div class="auth-logo">
      <span class="logo-icon">🎵</span>
      <h1>ArtistHub</h1>
      <p>Admin Panel</p>
    </div>

    <h2>Welcome back</h2>
    <p class="auth-subtitle">Sign in to your account</p>

    <div *ngIf="error" class="alert-error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email address</label>
        <input id="login-email" type="email" formControlName="email" class="input-field" placeholder="you@example.com" />
        <span class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">Valid email is required.</span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="login-password" type="password" formControlName="password" class="input-field" placeholder="••••••••" />
        <span class="error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">Password must be at least 6 characters.</span>
      </div>

      <button id="login-submit" type="submit" class="btn btn-primary full-width" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
