<div class="page-container">
  <div *ngIf="toast" class="toast" [class.toast-error]="toastType === 'error'">{{ toast }}</div>

  <div class="page-header">
    <div class="back-header">
      <button class="btn btn-secondary btn-icon" (click)="goBack()">← Back</button>
      <div>
        <h2>Songs</h2>
        <p *ngIf="artistId > 0">Artist: {{ artistName }}</p>
      </div>
    </div>
    <button *ngIf="role === 'super_admin' || role === 'artist'" id="create-song-btn" class="btn btn-primary"
      (click)="openModal()">+ Add Song</button>
  </div>

  <div class="table-container">
    <div *ngIf="loading" class="loading-row">Loading songs...</div>
    <table *ngIf="!loading">
      <thead>
        <tr>
          <th>Title</th>
          <th>Album</th>
          <th>Genre</th>
          <th>Created</th>
          <th *ngIf="role === 'artist'">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of songs">
          <td><strong>{{ s.title }}</strong></td>
          <td>{{ s.albumName || '—' }}</td>
          <td><span class="badge badge-genre">{{ s.genre }}</span></td>
          <td>{{ s.createdAt | date:'mediumDate' }}</td>
          <td class="actions">
            <button *ngIf="s.filePath" class="btn btn-secondary btn-sm" (click)="download(s)">Download MP3</button>
            <ng-container *ngIf="role === 'super_admin' || role === 'artist'">
              <button class="btn btn-secondary btn-sm" (click)="openModal(s)">✏️</button>
              <button class="btn btn-danger btn-sm" (click)="delete(s)">Delete</button>
            </ng-container>
          </td>
        </tr>
        <tr *ngIf="songs.length === 0">
          <td [attr.colspan]="'5'" class="empty-row">No songs yet.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" *ngIf="showModal" (click)="showModal=false">
    <div class="modal glass-panel" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>{{ editingSong ? 'Edit Song' : 'Add Song' }}</h3>
        <button class="modal-close" (click)="showModal=false">✕</button>
      </div>
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="song-fields">
          <div class="form-group">
            <label>Title</label>
            <input type="text" formControlName="title" class="input-field" placeholder="Song title" />
            <span class="error" *ngIf="form.get('title')?.invalid && form.get('title')?.touched">Required.</span>
          </div>
          <div class="form-group">
            <label>Album Name (optional)</label>
            <input type="text" formControlName="albumName" class="input-field" placeholder="Album name" />
          </div>
          <div class="form-group">
            <label>Genre</label>
            <select formControlName="genre" class="input-field">
              <option value="">Select genre...</option>
              <option *ngFor="let g of genres" [value]="g">{{ g }}</option>
            </select>
            <span class="error" *ngIf="form.get('genre')?.invalid && form.get('genre')?.touched">Required.</span>
          </div>
          <div class="form-group" *ngIf="!editingSong">
            <label>MP3 File</label>
            <input type="file" (change)="onFileSelected($event)" accept=".mp3" class="input-field" />
            <p class="help-text">Select an MP3 file to upload.</p>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" (click)="showModal=false">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            {{ editingSong ? 'Update' : 'Create' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
